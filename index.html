<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWARE Hair - Review Site</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa; color: #1a1a1a; line-height: 1.6;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
    header {
      text-align: center; padding: 2.5rem 0 1.5rem;
      border-bottom: 1px solid #e5e5e5; margin-bottom: 2rem;
    }
    header h1 {
      font-size: 1.5rem; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase;
    }
    header p { color: #888; font-size: 0.875rem; margin-top: 0.5rem; }
    .tip {
      background: #f0f7ff; border: 1px solid #d0e3f7; border-radius: 8px;
      padding: 1rem 1.25rem; margin-bottom: 2rem;
      font-size: 0.85rem; color: #3a6ea5;
    }
    .tip strong { display: block; margin-bottom: 0.25rem; }
    .tip a { color: #2563eb; }
    .category { margin-bottom: 2.5rem; }
    .category h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; }
    .cat-desc { color: #888; font-size: 0.85rem; margin-bottom: 1rem; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.75rem;
    }
    .card {
      display: block; background: #fff; border: 1px solid #e5e5e5;
      border-radius: 8px; padding: 1rem 1.25rem;
      text-decoration: none; color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover { border-color: #1a1a1a; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-label { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.25rem; }
    .card-desc { color: #888; font-size: 0.8rem; }
    footer {
      text-align: center; padding: 2rem 0; border-top: 1px solid #e5e5e5;
      margin-top: 2rem; color: #aaa; font-size: 0.75rem;
    }
    @media (max-width: 600px) {
      .wrap { padding: 1rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
  
<script>
(function() {
  var KEY = 'aware_review_auth';
  if (sessionStorage.getItem(KEY) === 'true') return;
  var pw = prompt('Enter the review site password:');
  if (pw === 'aware2026') {
    sessionStorage.setItem(KEY, 'true');
  } else {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui;color:#666"><p>Access denied. Refresh to try again.</p></div>';
  }
})();
</script>

</head>
<body>
  <div class="wrap">
    <header>
      <h1>AWARE Hair</h1>
      <p>Internal Review Site</p>
    </header>
    <div class="tip">
      <strong>How to leave comments</strong>
      Open any page, then highlight text you want to comment on. A toolbar will appear -
      click "Annotate" to leave your feedback. Comments are saved automatically.
      You will need a free <a href="https://hypothes.is/signup" target="_blank">Hypothesis account</a>.
    </div>
    

    <footer>AWARE Hair Review Site - 0 items</footer>
  </div>
</body>
</html>
