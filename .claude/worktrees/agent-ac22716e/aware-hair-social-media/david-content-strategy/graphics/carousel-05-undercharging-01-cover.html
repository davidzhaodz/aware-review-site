<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover - Undercharging</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a0a; padding: 20px; }
        .slide { width: 1080px; height: 1350px; position: relative; overflow: hidden; }
        .bg-photo { position: absolute; inset: 0; background-image: url('https://images.unsplash.com/photo-1562322140-8baeececf3df?w=1200&q=80'); background-size: cover; background-position: center; }
        .overlay { position: absolute; inset: 0; background: linear-gradient(170deg, rgba(16, 43, 38, 0.92) 0%, rgba(13, 36, 32, 0.88) 50%, rgba(10, 28, 25, 0.92) 100%); }
        .accent-glow { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 1000px; height: 800px; background: radial-gradient(ellipse, rgba(196, 69, 54, 0.15) 0%, transparent 60%); pointer-events: none; }
        .grain { position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E"); opacity: 0.03; mix-blend-mode: overlay; pointer-events: none; }
        .content { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; padding: 56px 56px 48px; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; }
        .badge { background: rgba(196, 69, 54, 0.25); border: 1px solid rgba(196, 69, 54, 0.5); color: #e07a6c; font-size: 18px; font-weight: 600; text-transform: uppercase; letter-spacing: 2.5px; padding: 14px 24px; border-radius: 6px; }
        .handle { color: rgba(244, 239, 233, 0.7); font-size: 22px; font-weight: 500; }
        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .audience-callout { color: #3aa8b8; font-size: 42px; font-weight: 700; text-transform: uppercase; letter-spacing: 6px; margin-bottom: 40px; }
        .headline { color: #f4efe9; font-size: 100px; font-weight: 700; line-height: 1.08; margin-bottom: 48px; max-width: 950px; }
        .headline .number { color: #e07a6c; }
        .source-line { color: rgba(244, 239, 233, 0.6); font-size: 28px; font-weight: 400; margin-bottom: 50px; max-width: 700px; line-height: 1.4; }
        .stats-row { display: flex; gap: 20px; }
        .stat-pill { background: rgba(244, 239, 233, 0.1); border: 1px solid rgba(244, 239, 233, 0.2); padding: 18px 28px; border-radius: 14px; display: flex; align-items: center; gap: 12px; }
        .pill-number { color: #3aa8b8; font-size: 36px; font-weight: 700; }
        .pill-label { color: rgba(244, 239, 233, 0.8); font-size: 20px; font-weight: 500; }
        .footer { display: flex; justify-content: flex-end; align-items: center; }
        .swipe-cta { display: flex; align-items: center; gap: 18px; color: rgba(244, 239, 233, 0.8); font-size: 26px; font-weight: 500; }
        .arrow-circle { width: 68px; height: 68px; border: 2px solid rgba(58, 168, 184, 0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(42, 118, 130, 0.25); }
        .arrow-circle svg { width: 30px; height: 30px; fill: none; stroke: #3aa8b8; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .accent-line { position: absolute; bottom: 0; left: 0; right: 0; height: 7px; background: linear-gradient(90deg, transparent 0%, #c44536 20%, #e07a6c 50%, #c44536 80%, transparent 100%); }
    </style>
</head>
<body>
    <div class="slide">
        <div class="bg-photo"></div>
        <div class="overlay"></div>
        <div class="accent-glow"></div>
        <div class="grain"></div>
        <div class="content">
            <div class="header">
                <div class="badge">Reality Check</div>
                <div class="handle">@awarehairpro</div>
            </div>
            <div class="main">
                <div class="audience-callout">Salon Owners</div>
                <h1 class="headline">
                    <span class="number">4</span> Signs You're<br>
                    Undercharging<br>
                    (And Don't Know It)
                </h1>
                <p class="source-line">Most stylists leave thousands on the table every year. Here's how to know if that's you.</p>
                <div class="stats-row">
                    <div class="stat-pill">
                        <span class="pill-number">67%</span>
                        <span class="pill-label">Of stylists undercharge</span>
                    </div>
                    <div class="stat-pill">
                        <span class="pill-number">$15K+</span>
                        <span class="pill-label">Left on table annually</span>
                    </div>
                </div>
            </div>
            <div class="footer">
                <div class="swipe-cta">
                    <span>Check the signs</span>
                    <div class="arrow-circle">
                        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </div>
                </div>
            </div>
        </div>
        <div class="accent-line"></div>
    </div>

<!-- Hypothesis Annotation -->
<script src="https://hypothes.is/embed.js" async></script>
</body>
</html>
