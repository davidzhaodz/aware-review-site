<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finding 3 - The Silent Killer</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 20px;
        }

        .slide {
            width: 1080px;
            height: 1350px;
            position: relative;
            overflow: hidden;
        }

        /* BRIGHTER background */
        .bg-photo {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 40% 50% at 80% 25%, rgba(196, 69, 54, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse 50% 35% at 40% 55%, rgba(10, 16, 14, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse 60% 50% at 10% 90%, rgba(10, 20, 18, 0.6) 0%, transparent 50%),
                linear-gradient(170deg,
                    #183832 0%,
                    #12302b 30%,
                    #0d221e 60%,
                    #0a1c19 100%);
        }

        .grain {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 56px 56px 48px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .finding-badge {
            background: rgba(196, 69, 54, 0.2);
            border: 1px solid rgba(196, 69, 54, 0.5);
            color: #f07a6c;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 12px 20px;
            border-radius: 6px;
        }

        .slide-indicator {
            color: rgba(244, 239, 233, 0.5);
            font-size: 20px;
            font-weight: 500;
        }

        /* Main content */
        .main-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .eyebrow {
            color: #e05a4a;
            font-size: 30px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 44px;
        }

        .big-stat {
            display: flex;
            align-items: baseline;
            justify-content: center;
            margin-bottom: 24px;
        }

        .stat-number {
            font-size: 240px;
            font-weight: 700;
            color: #f4efe9;
            line-height: 0.85;
            letter-spacing: -10px;
        }

        .stat-symbol {
            font-size: 110px;
            font-weight: 700;
            color: #f4efe9;
            margin-left: 4px;
        }

        .stat-label {
            color: #f4efe9;
            font-size: 60px;
            font-weight: 500;
            margin-bottom: 52px;
            line-height: 1.25;
        }

        /* Divider */
        .divider {
            width: 140px;
            height: 5px;
            background: #3aa8b8;
            margin-bottom: 44px;
        }

        /* Secondary stat */
        .secondary {
            color: rgba(244, 239, 233, 0.8);
            font-size: 38px;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .secondary strong {
            color: #3aa8b8;
            font-weight: 700;
        }

        /* Math box */
        .math-box {
            background: rgba(196, 69, 54, 0.15);
            border: 2px solid rgba(196, 69, 54, 0.4);
            padding: 28px 44px;
            border-radius: 14px;
            margin-bottom: 44px;
        }

        .math-text {
            color: #f4efe9;
            font-size: 32px;
            font-weight: 500;
        }

        .math-text span {
            color: #e05a4a;
            font-weight: 700;
        }

        /* Action box */
        .action-box {
            background: rgba(42, 118, 130, 0.18);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(42, 118, 130, 0.4);
            border-radius: 18px;
            padding: 32px 40px;
            width: 100%;
            max-width: 820px;
            position: relative;
            overflow: hidden;
        }

        .action-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #2a7682, #5fb8c4);
        }

        .action-label {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: #6ec9d6;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        .action-label svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .action-text {
            color: #f4efe9;
            font-size: 28px;
            font-weight: 500;
            line-height: 1.45;
        }

        .action-text em {
            color: rgba(244, 239, 233, 0.9);
            font-style: italic;
        }

        /* Footer */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
        }

        .source {
            color: rgba(244, 239, 233, 0.45);
            font-size: 18px;
        }

        .swipe-hint {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(244, 239, 233, 0.6);
            font-size: 18px;
        }

        .swipe-hint svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="bg-photo"></div>
        <div class="grain"></div>

        <div class="content">
            <div class="header">
                <div class="finding-badge">Finding 2 of 4</div>
                <div class="slide-indicator">@awarehairpro</div>
            </div>

            <div class="main-section">
                <div class="eyebrow">The Silent Killer</div>

                <div class="big-stat">
                    <span class="stat-number">96</span>
                    <span class="stat-symbol">%</span>
                </div>

                <div class="stat-label">
                    of unhappy clients<br>never complain
                </div>

                <div class="divider"></div>

                <div class="secondary">
                    They just leave and tell <strong>9-15 people</strong>
                </div>

                <div class="math-box">
                    <div class="math-text">
                        <span>1</span> bad review = <span>~24</span> silent unhappy clients
                    </div>
                </div>

                <div class="action-box">
                    <div class="action-label">
                        <svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                        Do This Today
                    </div>
                    <div class="action-text">
                        Text your last 3 clients and ask:<br>
                        <em>"How did everything turn out?"</em>
                    </div>
                </div>
            </div>

            <div class="footer">
                <div class="source">Source: Zolmi Industry Research</div>
                <div class="swipe-hint">
                    <span>Next finding</span>
                    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </div>
        </div>
    </div>

<!-- Hypothesis Annotation -->
<script src="https://hypothes.is/embed.js" async></script>
</body>
</html>
