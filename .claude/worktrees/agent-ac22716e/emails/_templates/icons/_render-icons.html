<!DOCTYPE html>
<html>
<head><style>body{margin:0;background:transparent;display:flex;gap:40px;padding:20px;} .icon{width:144px;height:144px;}</style></head>
<body>
<div class="icon" id="shipping">
<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 36 36" fill="none" stroke="#3A3A3A" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round">
  <rect x="6" y="14" width="24" height="17" rx="1"/>
  <rect x="5" y="10" width="26" height="5" rx="1"/>
  <line x1="18" y1="10" x2="18" y2="31"/>
  <path d="M15.5 22.5c0-1.2 1.2-2.5 2.5-1.2 1.3-1.3 2.5 0 2.5 1.2 0 1.5-2.5 3-2.5 3s-2.5-1.5-2.5-3z"/>
</svg>
</div>
<div class="icon" id="gift">
<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 36 36" fill="none" stroke="#3A3A3A" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round">
  <rect x="7" y="17" width="22" height="14" rx="1"/>
  <rect x="5" y="13" width="26" height="5" rx="1"/>
  <line x1="18" y1="13" x2="18" y2="31"/>
  <line x1="5" y1="15.5" x2="31" y2="15.5"/>
  <path d="M18 13c-1-4-4-8-7-6s1 6 7 6"/>
  <path d="M18 13c1-4 4-8 7-6s-1 6-7 6"/>
  <path d="M18 13c-2-3-6-6-8-4" stroke-width="0.7"/>
  <path d="M18 13c2-3 6-6 8-4" stroke-width="0.7"/>
</svg>
</div>
<div class="icon" id="guarantee">
<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 36 36" fill="none" stroke="#3A3A3A" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round">
  <rect x="7" y="4" width="22" height="28" rx="2"/>
  <path d="M22 4v6h7" stroke-width="0.9"/>
  <line x1="22" y1="4" x2="29" y2="10"/>
  <line x1="12" y1="15" x2="24" y2="15" stroke-width="0.6"/>
  <line x1="12" y1="19" x2="24" y2="19" stroke-width="0.6"/>
  <line x1="12" y1="23" x2="20" y2="23" stroke-width="0.6"/>
  <circle cx="22" cy="26" r="5" fill="#E8E2DA" stroke="#3A3A3A" stroke-width="0.9"/>
  <path d="M19.5 26l1.5 1.5 3-3" stroke-width="1"/>
</svg>
</div>
<script>
async function renderIcons() {
  const icons = ['shipping', 'gift', 'guarantee'];
  const results = {};
  for (const name of icons) {
    const div = document.getElementById(name);
    const svg = div.querySelector('svg');
    const svgData = new XMLSerializer().serializeToString(svg);
    const blob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    await new Promise((resolve) => {
      img.onload = resolve;
      img.src = url;
    });
    const canvas = document.createElement('canvas');
    canvas.width = 144;
    canvas.height = 144;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, 144, 144);
    results[name] = canvas.toDataURL('image/png');
    URL.revokeObjectURL(url);
  }
  window.__iconData = results;
  document.title = 'DONE';
}
renderIcons();
</script>

<!-- Hypothesis Annotation -->
<script src="https://hypothes.is/embed.js" async></script>
</body>
</html>
