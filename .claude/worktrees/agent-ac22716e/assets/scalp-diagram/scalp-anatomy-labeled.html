<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scalp Anatomy - AWARE Hair</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5eed6;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'EB Garamond', 'Georgia', serif;
    color: #2a2520;
  }

  .page {
    width: 1408px;
    background: #f5eed6;
    padding: 40px 0 36px;
  }

  .diagram-wrap {
    position: relative;
    width: 1408px;
    height: 768px;
    margin: 0 auto;
    overflow: hidden;
  }

  .diagram-wrap img {
    display: block;
    width: 1408px;
    height: 768px;
  }

  /* Labels */
  .lbl {
    position: absolute;
    z-index: 10;
    font-family: 'EB Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: #2a2520;
    letter-spacing: 0.03em;
    line-height: 1;
    white-space: nowrap;
  }

  /* SVG lines */
  .lines {
    position: absolute;
    top: 0;
    left: 0;
    width: 1408px;
    height: 768px;
    z-index: 5;
    pointer-events: none;
  }

  .caption {
    text-align: center;
    margin-top: 28px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 21px;
    font-weight: 400;
    color: #5a5550;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>
<div class="page">
  <div class="diagram-wrap">
    <img src="base-img-1708.png" alt="Scalp cross-section anatomy diagram">

    <svg class="lines" viewBox="0 0 1408 768">
      <!-- Left labels to anatomy -->
      <!-- Stratum Corneum -> top thin band of cross-section -->
      <line x1="210" y1="155" x2="355" y2="145" stroke="#2a2520" stroke-width="1" opacity="0.5"/>
      <circle cx="355" cy="145" r="3" fill="#2a2520" opacity="0.5"/>

      <!-- Epidermis -> upper cell layer, roughly y:230 in the anatomy -->
      <line x1="140" y1="300" x2="370" y2="270" stroke="#2a2520" stroke-width="1" opacity="0.5"/>
      <circle cx="370" cy="270" r="3" fill="#2a2520" opacity="0.5"/>

      <!-- Dermis -> thick pink middle -->
      <line x1="120" y1="430" x2="380" y2="400" stroke="#2a2520" stroke-width="1" opacity="0.5"/>
      <circle cx="380" cy="400" r="3" fill="#2a2520" opacity="0.5"/>

      <!-- Hypodermis -> bottom fat layer -->
      <line x1="165" y1="570" x2="385" y2="560" stroke="#2a2520" stroke-width="1" opacity="0.5"/>
      <circle cx="385" cy="560" r="3" fill="#2a2520" opacity="0.5"/>

      <!-- Right labels to structures -->
      <!-- Hair Follicle -> shaft near top -->
      <line x1="1020" y1="95" x2="748" y2="120" stroke="#2a2520" stroke-width="1" opacity="0.5"/>
      <circle cx="748" cy="120" r="3" fill="#2a2520" opacity="0.5"/>

      <!-- Sebaceous Gland -> gland blob right of follicle -->
      <line x1="1060" y1="265" x2="835" y2="280" stroke="#2a2520" stroke-width="1" opacity="0.5"/>
      <circle cx="835" cy="280" r="3" fill="#2a2520" opacity="0.5"/>

      <!-- Dermal Papilla -> follicle bulb base -->
      <line x1="1040" y1="470" x2="720" y2="490" stroke="#2a2520" stroke-width="1" opacity="0.5"/>
      <circle cx="720" cy="490" r="3" fill="#2a2520" opacity="0.5"/>

      <!-- Blood Vessels -> red/blue vessels at bottom -->
      <line x1="1060" y1="590" x2="810" y2="580" stroke="#2a2520" stroke-width="1" opacity="0.5"/>
      <circle cx="810" cy="580" r="3" fill="#2a2520" opacity="0.5"/>
    </svg>

    <!-- LEFT SIDE: skin layers (top to bottom) -->
    <div class="lbl" style="left: 22px; top: 140px;">Stratum Corneum</div>
    <div class="lbl" style="left: 22px; top: 286px;">Epidermis</div>
    <div class="lbl" style="left: 22px; top: 416px;">Dermis</div>
    <div class="lbl" style="left: 22px; top: 556px;">Hypodermis</div>

    <!-- RIGHT SIDE: structures -->
    <div class="lbl" style="left: 1030px; top: 80px;">Hair Follicle</div>
    <div class="lbl" style="left: 1070px; top: 250px;">Sebaceous Gland</div>
    <div class="lbl" style="left: 1050px; top: 456px;">Dermal Papilla</div>
    <div class="lbl" style="left: 1070px; top: 576px;">Blood Vessels</div>
  </div>

  <p class="caption">
    The scalp barrier sits at the surface, but its health affects every layer beneath it.
  </p>
</div>

<!-- Hypothesis Annotation -->
<script src="https://hypothes.is/embed.js" async></script>
</body>
</html>
