<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beauty Tank 2026 - Press Card (Single Slide)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #e8e4df;
    padding: 40px;
  }

  .card {
    width: 1080px;
    height: 1440px;
    background: #ffffff;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── MASTHEAD ── */
  .masthead {
    padding: 56px 80px 0;
    text-align: center;
    flex-shrink: 0;
  }

  .publication-logo {
    height: 32px;
    opacity: 0.7;
    margin-bottom: 10px;
  }

  .publication-url {
    font-size: 16px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #999;
    font-weight: 400;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 48px;
    height: 3px;
    background: #cc2936;
    margin: 32px auto 0;
  }

  /* ── HEADLINE ── */
  .headline-block {
    padding: 32px 80px 0;
    text-align: center;
    flex-shrink: 0;
  }

  .category {
    font-size: 17px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #cc2936;
    font-weight: 500;
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 64px;
    font-weight: 500;
    line-height: 1.1;
    color: #1a1a1a;
    letter-spacing: -0.5px;
    margin-bottom: 14px;
  }

  .subtitle {
    font-size: 22px;
    color: #777;
    font-weight: 300;
    font-style: italic;
  }

  /* ── THIN RULE ── */
  .rule {
    width: calc(100% - 160px);
    height: 1px;
    background: #e5e5e5;
    margin: 32px auto 0;
    flex-shrink: 0;
  }

  /* ── BODY ── */
  .body {
    padding: 32px 80px 0;
    flex-shrink: 0;
  }

  .body h2 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 32px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 16px;
  }

  .body p {
    font-size: 24px;
    line-height: 1.6;
    color: #444;
    font-weight: 300;
  }

  /* ── HERO IMAGE ── */
  .hero {
    flex: 1;
    margin: 32px 80px 0;
    border-radius: 6px;
    overflow: hidden;
    min-height: 0;
  }

  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 42%;
    display: block;
  }

  /* ── FOOTER ── */
  .footer {
    padding: 24px 80px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .footer .source {
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #bbb;
  }

  .aware-wordmark {
    height: 18px;
    opacity: 0.35;
  }
</style>
</head>
<body>

<div class="card">

  <!-- Masthead -->
  <div class="masthead">
    <img src="/Users/dzhao/Downloads/Who was crowned the 2026 Beauty Tank Make-up_Haircare winner at MakeUp in LosAngeles__files/logo.png" alt="Formes de Luxe" class="publication-logo">
    <div class="publication-url">formesdeluxe.com</div>
  </div>

  <div class="divider"></div>

  <!-- Headline -->
  <div class="headline-block">
    <div class="category">MakeUp in LosAngeles, March 2026</div>
    <h1>Beauty Tank 2026 Winner</h1>
  </div>

  <div class="rule"></div>

  <!-- Body -->
  <div class="body">
    <h2>AWARE Hair</h2>
    <p>A salon-grade scalp wellness brand powered by a patent-pending AWAREBIO complex that strengthens the scalp barrier and balances the microbiome.</p>
  </div>

  <!-- Hero Image -->
  <div class="hero">
    <img src="/Users/dzhao/Downloads/collection_full_blue.png" alt="AWARE Hair Collection">
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="source">Source: Formes de Luxe</span>
    <img src="/Users/dzhao/Projects/aware-hair-control/assets/images/brand/aware-hair-wordmark.png" alt="AWARE Hair" class="aware-wordmark">
  </div>

</div>


<!-- Hypothesis Annotation -->
<script src="https://hypothes.is/embed.js" async></script>
</body>
</html>
