function renderAccounts(filter) {
  acctTbl.innerHTML = '';

    const dr = a.dr ? parseFloat(a.dr.replace(/,/g,'')) : 0;
    const cr = a.cr ? parseFloat(a.cr.replace(/,/g,'')) : 0;
    const net = dr - cr;
    acctTbl.innerHTML += `<tr><td>${a.a}</td><td class="r">${a.dr||'-'}</td><td class="r">${a.cr||'-'}</td><td class="r" style="${net<0?'color:var(--danger)':''}">${net>=0?'$':'- $'}${Math.abs(net).toLocaleString(undefined,{minimumFractionDigits:2})}</td><td style="font-size:10px;color:var(--ink-3)">${a.t}</td></tr>`;

}
