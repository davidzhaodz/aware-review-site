<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWARE Blog Articles</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #161616;
            --bg-tertiary: #1e1e1e;
            --bg-card: #1a1a1a;
            --bg-hover: #242424;
            --text-primary: #e5e5e5;
            --text-secondary: #a0a0a0;
            --text-muted: #666;
            --border: #2a2a2a;
            --border-light: #333;
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.15);
            --yellow: #eab308;
            --yellow-dim: rgba(234, 179, 8, 0.15);
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.15);
            --blue: #3b82f6;
            --blue-dim: rgba(59, 130, 246, 0.15);
            --purple: #a855f7;
            --purple-dim: rgba(168, 85, 247, 0.15);
            --cyan: #06b6d4;
            --cyan-dim: rgba(6, 182, 212, 0.15);
            --orange: #f97316;
            --orange-dim: rgba(249, 115, 22, 0.15);
            --teal: #14b8a6;
            --teal-dim: rgba(20, 184, 166, 0.15);
            --panel-left: 34%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            font-size: 13px;
            line-height: 1.4;
            overflow: hidden;
        }

        /* Top Bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            height: 48px;
            flex-shrink: 0;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .topbar h1 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }
        .topbar-dot {
            width: 6px; height: 6px;
            background: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(6,182,212,0.4);
        }
        .topbar-stats { display: flex; gap: 20px; align-items: center; }
        .topbar-stat {
            display: flex; align-items: center; gap: 6px;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .topbar-stat strong {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        .mode-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 20px;
            padding-left: 20px;
            border-left: 1px solid var(--border);
        }
        .mode-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 10px;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }
        .mode-badge.local {
            background: var(--bg-tertiary);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .mode-badge.review {
            background: var(--purple-dim);
            color: var(--purple);
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 6px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            flex-wrap: wrap;
        }
        .filter-btn {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .filter-btn:hover { border-color: var(--text-muted); color: var(--text-secondary); }
        .filter-btn.active {
            background: var(--cyan-dim);
            border-color: var(--cyan);
            color: var(--cyan);
        }

        /* Layout */
        .layout {
            display: flex;
            height: calc(100vh - 48px);
        }
        .panel-left {
            width: var(--panel-left);
            min-width: 280px;
            background: var(--bg-primary);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .panel-left::-webkit-scrollbar { width: 5px; }
        .panel-left::-webkit-scrollbar-track { background: transparent; }
        .panel-left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .article-list {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        /* Divider */
        .divider {
            width: 5px;
            cursor: col-resize;
            background: var(--border);
            position: relative;
            flex-shrink: 0;
            transition: background 0.15s ease;
        }
        .divider:hover, .divider.dragging { background: var(--text-muted); }
        .divider::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 3px; height: 32px;
            border-radius: 2px;
            background: var(--text-muted);
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .divider:hover::after, .divider.dragging::after { opacity: 0.5; }

        .panel-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            min-width: 300px;
        }

        /* Preview Header */
        .preview-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 52px;
            flex-shrink: 0;
        }
        .preview-badge {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .preview-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
            flex: 1;
        }
        .preview-subject {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .preview-path {
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'SF Mono', 'Fira Code', monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .preview-open {
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 3px 10px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            text-decoration: none;
            transition: border-color 0.15s, color 0.15s;
        }
        .preview-open:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        /* Preview Frame */
        .preview-frame {
            flex: 1;
            position: relative;
            background: #fff;
        }
        .preview-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }
        .preview-empty {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            gap: 12px;
        }
        .preview-empty-icon {
            width: 48px; height: 48px;
            border: 2px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 20px;
        }
        .preview-empty p {
            color: var(--text-muted);
            font-size: 12px;
        }

        /* Article Node */
        .article-node {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
        }
        .article-node:hover {
            background: var(--bg-hover);
            border-color: var(--border);
        }
        .article-node.active {
            border-color: var(--cyan);
            background: var(--cyan-dim);
        }
        .article-node .node-num {
            width: 28px; height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .article-node .node-info {
            flex: 1;
            min-width: 0;
        }
        .article-node .node-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
            margin-bottom: 4px;
        }
        .article-node .node-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .article-node .meta-tag {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .article-node .meta-detail {
            font-size: 10px;
            color: var(--text-muted);
        }
        .status-badge {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* Category separator */
        .category-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            padding: 16px 12px 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .category-label:first-child { padding-top: 8px; }
        .category-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Loading shimmer */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .preview-loading {
            position: absolute;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        .preview-loading-bar {
            width: 120px;
            height: 3px;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--border) 0%, var(--text-muted) 50%, var(--border) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease infinite;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .layout { flex-direction: column; }
            .panel-left {
                width: 100% !important;
                max-height: 40vh;
                min-width: unset;
            }
            .divider {
                width: 100%;
                height: 5px;
                cursor: row-resize;
            }
            .panel-right { min-width: unset; }
        }

        /* Keyboard focus */
        .article-node:focus-visible {
            outline: 2px solid var(--blue);
            outline-offset: 1px;
        }
    </style>
</head>

let previewMode = isOnReviewSite ? 'review' : 'local';

// -- Blog Article Data --
const BLOG_BASE = '../../marketing/blog/';

// -- Category Config --
const CATEGORIES = {
    'Scalp Science': { color: 'cyan', icon: '\u{1F52C}' },
    'Scalp Health':  { color: 'teal', icon: '\u{1F33F}' },
};

const STATUS_CONFIG = {
    'ready':     { label: 'Ready', color: 'green' },
    'draft':     { label: 'Draft', color: 'yellow' },
    'published': { label: 'Live', color: 'blue' },
    'review':    { label: 'Needs Review', color: 'orange' },
};

// -- Color Helpers --
function getColor(c) { return getComputedStyle(document.documentElement).getPropertyValue('--' + c).trim(); }
function getDim(c) { return getComputedStyle(document.documentElement).getPropertyValue('--' + c + '-dim').trim(); }

// -- State --
let activeArticleId = null;
let activeFilter = 'all';
let allNodes = [];

// -- Render Filters --
function renderFilters() {
    const bar = document.getElementById('filterBar');
    const categories = ['all', ...Object.keys(CATEGORIES)];
    const statuses = [...new Set(articles.map(a => a.status))];

    bar.innerHTML = '';

    // Category filters
    categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (activeFilter === cat ? ' active' : '');
        btn.textContent = cat === 'all' ? 'All' : cat;
        btn.addEventListener('click', () => {
            activeFilter = cat;
            renderFilters();
            renderArticles();
        });
        bar.appendChild(btn);
    });

    // Status filters
    statuses.forEach(st => {
        const cfg = STATUS_CONFIG[st];
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (activeFilter === 'status:' + st ? ' active' : '');
        btn.textContent = cfg.label;
        btn.style.borderColor = activeFilter === 'status:' + st ? getColor(cfg.color) : '';
        btn.style.color = activeFilter === 'status:' + st ? getColor(cfg.color) : '';
        btn.addEventListener('click', () => {
            activeFilter = activeFilter === 'status:' + st ? 'all' : 'status:' + st;
            renderFilters();
            renderArticles();
        });
        bar.appendChild(btn);
    });
}

// -- Render Articles --
function renderArticles() {
    const list = document.getElementById('articleList');
    list.innerHTML = '';
    allNodes = [];

    let filtered = articles;
    if (activeFilter !== 'all') {
        if (activeFilter.startsWith('status:')) {
            filtered = articles.filter(a => a.status === activeFilter.replace('status:', ''));
        } else {
            filtered = articles.filter(a => a.category === activeFilter);
        }
    }

    // Group by category
    const grouped = {};
    filtered.forEach(a => {
        if (!grouped[a.category]) grouped[a.category] = [];
        grouped[a.category].push(a);
    });

    // Sort categories: Scalp Science first, then Scalp Health
    const catOrder = ['Scalp Science', 'Scalp Health'];
    let articleNum = 0;

    catOrder.forEach(catName => {
        const items = grouped[catName];
        if (!items || items.length === 0) return;

        const catCfg = CATEGORIES[catName];

        // Category label
        const label = document.createElement('div');
        label.className = 'category-label';
        label.innerHTML = `<span style="color:${getColor(catCfg.color)}">${catCfg.icon}</span> ${catName} <span style="font-weight:400;color:var(--text-muted)">${items.length}</span>`;
        list.appendChild(label);

        // Sort by date
        items.sort((a, b) => a.date.localeCompare(b.date));

        items.forEach(article => {
            articleNum++;
            const stCfg = STATUS_CONFIG[article.status];
            const catColor = getColor(catCfg.color);
            const catDim = getDim(catCfg.color);

            const node = document.createElement('div');
            node.className = 'article-node';
            node.tabIndex = 0;
            node.dataset.articleId = article.id;

            node.innerHTML = `
                <div class="node-num" style="background:${catDim};color:${catColor};border-radius:6px;">${articleNum}</div>
                <div class="node-info">
                    <div class="node-title">${article.shortTitle}</div>
                    <div class="node-meta">
                        <span class="meta-tag" style="background:${catDim};color:${catColor};">${article.category}</span>
                        <span class="meta-detail">${article.readTime}</span>
                        <span class="meta-detail">${article.date}</span>
                    </div>
                </div>
                <span class="status-badge" style="background:${getDim(stCfg.color)};color:${getColor(stCfg.color)};">${stCfg.label}</span>
            `;

            node.addEventListener('click', () => selectArticle(article));
            node.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    selectArticle(article);
                }
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    const idx = allNodes.indexOf(node);
                    if (idx < allNodes.length - 1) allNodes[idx + 1].focus();
                }
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    const idx = allNodes.indexOf(node);
                    if (idx > 0) allNodes[idx - 1].focus();
                }
            });

            list.appendChild(node);
            allNodes.push(node);
        });
    });

    // Restore active state
    if (activeArticleId) {
        const active = list.querySelector(`[data-article-id="${activeArticleId}"]`);
        if (active) active.classList.add('active');
    }

    updateStats(filtered);
}

// -- Update Stats --
function updateStats(filtered) {
    document.getElementById('articleCount').textContent = filtered.length;
    document.getElementById('readyCount').textContent = filtered.filter(a => a.status === 'ready' || a.status === 'published').length;
    document.getElementById('draftCount').textContent = filtered.filter(a => a.status === 'draft' || a.status === 'review').length;
}

// -- Select Article --
function selectArticle(article) {
    activeArticleId = article.id;

    const catCfg = CATEGORIES[article.category];
    const color = getColor(catCfg.color);
    const dim = getDim(catCfg.color);

    // Update node states
    document.querySelectorAll('.article-node').forEach(n => {
        n.classList.remove('active');
        n.style.background = '';
        n.style.borderColor = '';
    });
    const selNode = document.querySelector(`[data-article-id="${article.id}"]`);
    if (selNode) {
        selNode.classList.add('active');
        selNode.style.background = dim;
        selNode.style.borderColor = color;
    }

    // Resolve file path
    const filePath = previewMode === 'review'
        ? '/marketing/blog/' + article.file
        : BLOG_BASE + article.file;

    // Update preview header
    const header = document.getElementById('previewHeader');
    header.innerHTML = `
        <span class="preview-badge" style="background:${dim};color:${color};">${article.category}</span>
        <div class="preview-meta">
            <div class="preview-subject">${article.title}</div>
            <div class="preview-path">marketing/blog/${article.file}</div>
        </div>
        <a class="preview-open" href="${filePath}" target="_blank" rel="noopener" title="${previewMode === 'review' ? 'Open with annotations' : 'Open in new tab'}">Open &#x2197;</a>
    `;

    // Load in iframe
    const iframe = document.getElementById('previewIframe');
    const emptyMain = document.getElementById('previewEmptyMain');
    emptyMain.style.display = 'none';
    iframe.style.display = 'block';

    // Show loading
    let loader = document.querySelector('.preview-loading');
    if (!loader) {
        loader = document.createElement('div');
        loader.className = 'preview-loading';
        loader.innerHTML = '<div class="preview-loading-bar"></div>';
        document.getElementById('previewFrame').appendChild(loader);
    }
    loader.style.display = 'flex';

    iframe.onload = () => { loader.style.display = 'none'; };

    if (previewMode === 'review') {
        iframe.removeAttribute('sandbox');
        iframe.src = filePath;
    } else {
        iframe.setAttribute('sandbox', 'allow-same-origin');
        iframe.src = filePath;
    }

    // Scroll node into view
    if (selNode) {
        selNode.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}

// -- Resizable Divider --
(function initDivider() {
    const divider = document.getElementById('divider');
    const panelLeft = document.getElementById('panelLeft');
    let isDragging = false;

    divider.addEventListener('mousedown', (e) => {
        isDragging = true;
        divider.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const pct = (e.clientX / window.innerWidth) * 100;
        const clamped = Math.max(20, Math.min(65, pct));
        panelLeft.style.width = clamped + '%';
    });

    document.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        divider.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });
})();

// -- Mode Indicator --
function initModeIndicator() {
    const badge = document.getElementById('modeBadge');
    if (previewMode === 'review') {
        badge.textContent = 'Review Site - Hypothesis Annotations';
        badge.className = 'mode-badge review';
    } else {
        badge.textContent = 'Local Preview';
        badge.className = 'mode-badge local';
    }
}

// -- Init --
renderFilters();
renderArticles();
initModeIndicator();
</script>
