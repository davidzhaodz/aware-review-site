<!--
  AWARE Value Proposition Bar
  Three-column section: Complimentary Shipping, Complimentary Gift, Satisfaction Guaranteed

  Usage: Drop into any email template (typically before footer or after hero/CTA).
  Requires: 600px max-width container context.

  ICONS: Uses Unicode characters styled in brand gold (#8B7355) at 28px.
  - Shipping: &#9993; (envelope)
  - Gift: &#10029; (star)
  - Guarantee: &#10003; (checkmark)
  These render reliably across all email clients without external dependencies.

  Mobile: Uses grid-3up class - stacks vertically on screens < 600px.
  Include this CSS in the email's <style> block:
    .grid-3up td { display: block !important; width: 100% !important; padding: 0 0 30px 0 !important; }
-->

          <!-- Dark divider bar -->
          <tr>
            <td style="background-color: #1C2420; height: 4px; font-size: 0; line-height: 0;">&nbsp;</td>
          </tr>

          <!-- Value Proposition Bar -->
          <tr>
            <td style="background-color: #E8E2DA; padding: 55px 30px 60px 30px;" class="mobile-padding">
              <table border="0" cellpadding="0" cellspacing="0" role="presentation" width="100%" class="grid-3up">
                <tr>
                  <!-- Complimentary Shipping -->
                  <td width="33%" valign="top" style="text-align: center; padding: 0 15px;">
                    <table border="0" cellpadding="0" cellspacing="0" role="presentation" style="margin: 0 auto 20px auto;">
                      <tr>
                        <td style="text-align: center; vertical-align: middle; font-size: 28px; color: #8B7355; line-height: 1;">
                          &#9993;
                        </td>
                      </tr>
                    </table>
                    <p style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; color: #1C2420; text-transform: uppercase; letter-spacing: 3px; margin: 0 0 12px 0; font-weight: 400;">
                      Complimentary Shipping
                    </p>
                    <p style="font-family: Georgia, 'Times New Roman', Times, serif; font-size: 14px; color: #4A4A4A; line-height: 1.6; margin: 0;">
                      Complimentary shipping on all orders
                    </p>
                  </td>

                  <!-- Complimentary Gift -->
                  <td width="33%" valign="top" style="text-align: center; padding: 0 15px;">
                    <table border="0" cellpadding="0" cellspacing="0" role="presentation" style="margin: 0 auto 20px auto;">
                      <tr>
                        <td style="text-align: center; vertical-align: middle; font-size: 28px; color: #8B7355; line-height: 1;">
                          &#10029;
                        </td>
                      </tr>
                    </table>
                    <p style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; color: #1C2420; text-transform: uppercase; letter-spacing: 3px; margin: 0 0 12px 0; font-weight: 400;">
                      Complimentary Gift
                    </p>
                    <p style="font-family: Georgia, 'Times New Roman', Times, serif; font-size: 14px; color: #4A4A4A; line-height: 1.6; margin: 0;">
                      A surprise gift included with every order
                    </p>
                  </td>

                  <!-- Satisfaction Guaranteed -->
                  <td width="33%" valign="top" style="text-align: center; padding: 0 15px;">
                    <table border="0" cellpadding="0" cellspacing="0" role="presentation" style="margin: 0 auto 20px auto;">
                      <tr>
                        <td style="text-align: center; vertical-align: middle; font-size: 28px; color: #8B7355; line-height: 1;">
                          &#10003;
                        </td>
                      </tr>
                    </table>
                    <p style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; color: #1C2420; text-transform: uppercase; letter-spacing: 3px; margin: 0 0 12px 0; font-weight: 400;">
                      Satisfaction Guaranteed
                    </p>
                    <p style="font-family: Georgia, 'Times New Roman', Times, serif; font-size: 14px; color: #4A4A4A; line-height: 1.6; margin: 0;">
                      Returns accepted within fourteen days
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- /Value Proposition Bar -->
