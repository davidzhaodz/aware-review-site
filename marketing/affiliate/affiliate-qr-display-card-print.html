<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWARE Hair - Affiliate QR Display Card (4x6 Print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  @page {
    size: 4in 6in;
    margin: 0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #d5d0c8;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 4in;
    height: 6in;
    margin: 20px auto;
    position: relative;
    overflow: hidden;
    background: #102B26;
  }

  /* Full bleed product image */
  .hero-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 35%;
    display: block;
  }

  /* Dark gradient overlay from bottom */
  .overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 62%;
    background: linear-gradient(
      to top,
      rgba(16, 43, 38, 0.94) 0%,
      rgba(16, 43, 38, 0.82) 35%,
      rgba(16, 43, 38, 0.45) 65%,
      rgba(16, 43, 38, 0.08) 85%,
      transparent 100%
    );
    pointer-events: none;
  }

  /* Logo - top left */
  .logo {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    height: 22px;
    width: auto;
    filter: brightness(0) invert(1);
    opacity: 0.92;
  }

  /* Content overlay - bottom */
  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 22px 22px;
    z-index: 2;
  }

  .headline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 24px;
    font-weight: 300;
    line-height: 1.2;
    color: #ffffff;
    margin-bottom: 8px;
  }

  .headline em {
    font-style: italic;
    color: #D4A574;
  }

  .offer {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.82);
    line-height: 1.55;
    margin-bottom: 16px;
  }

  .offer .value {
    color: #D4A574;
    font-weight: 500;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, #D4A574 0%, rgba(212, 165, 116, 0.2) 100%);
    margin-bottom: 14px;
  }

  /* QR row */
  .qr-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .qr-patch {
    width: 76px;
    height: 76px;
    background: #ffffff;
    border-radius: 6px;
    padding: 6px;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
  }

  .qr-patch img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .qr-label {
    font-size: 8.5px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #D4A574;
    margin-bottom: 4px;
  }

  .qr-sublabel {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 13px;
    font-style: italic;
    color: rgba(255, 255, 255, 0.65);
    line-height: 1.4;
  }

  /* Print */
  @media print {
    html, body {
      background: none;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .card {
      margin: 0;
      break-inside: avoid;
    }
    .no-print { display: none !important; }
  }

  .print-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #102B26;
    color: #f4efe9;
    border: none;
    padding: 10px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
  }
  .print-btn:hover { background: #1a3d35; }
</style>
</head>
<body>

<button class="print-btn no-print" onclick="window.print()">Print / Save PDF</button>

<div class="card">

  <!-- Full bleed product image -->
  <img class="hero-image" src="../../assets/images/products/collection-full-range.png" alt="AWARE Hair Collection">

  <!-- Gradient overlay -->
  <div class="overlay"></div>

  <!-- Logo -->
  <img class="logo" src="../../assets/images/brand/aware-hair-wordmark-horizontal.png" alt="AWARE Hair">

  <!-- Content -->
  <div class="content">

    <div class="headline">Proactive Scalp Wellness, <em>Simplified</em></div>

    <div class="offer">Complimentary sandalwood meridian scalp gua sha ($32 value) with any purchase over $150 <span class="value">(Use code 'TOMA')</span></div>

    <div class="divider"></div>

    <!-- QR Code - swap image src per salon -->
    <div class="qr-row">
      <div class="qr-patch">
        <img src="sample-qr.png" alt="Scan to shop">
      </div>
      <div class="qr-text">
        <div class="qr-label">Scan to Shop at awarehair.com</div>
        <div class="qr-sublabel">Your technician earns with every purchase</div>
        <div class="qr-sublabel">Follow us @awarehaircare on Instagram</div>
      </div>
    </div>

  </div>

</div>


<!-- Hypothesis Annotation -->
<script src="https://hypothes.is/embed.js" async></script>
</body>
</html>
