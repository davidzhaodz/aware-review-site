<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #000;
        font-family: "DM Sans", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: #0a1f1b;
      }

      .body-wrap {
        position: absolute;
        inset: 0;
        width: 1080px;
        height: 1920px;
      }
      .body-wrap video {
        width: 1080px;
        height: 1920px;
        object-fit: cover;
        background: #0a1f1b;
      }

      .overlay-full {
        position: absolute;
        inset: 0;
        width: 1080px;
        height: 1920px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="25"
      data-width="1080"
      data-height="1920"
    >
      <div
        id="seg-intro"
        class="clip overlay-full"
        data-composition-id="intro-card"
        data-composition-src="compositions/intro-card.html"
        data-start="0"
        data-duration="1.5"
        data-track-index="10"
        style="z-index: 50;"
      ></div>

      <div class="body-wrap" style="z-index: 1;">
        <video
          id="body-vid"
          class="clip"
          data-start="1.5"
          data-duration="20"
          data-track-index="1"
          src="graded-body.mp4"
          muted
          playsinline
          crossorigin="anonymous"
        ></video>
      </div>
      <audio
        id="body-aud"
        class="clip"
        data-start="1.5"
        data-duration="20"
        data-track-index="2"
        data-volume="1"
        src="graded-body.mp4"
        crossorigin="anonymous"
      ></audio>

      <audio
        id="bed-music"
        class="clip"
        data-start="1.5"
        data-duration="20"
        data-track-index="3"
        data-volume="0.18"
        src="music-track.mp3"
        crossorigin="anonymous"
      ></audio>

      <div
        id="seg-lt"
        class="clip overlay-full"
        data-composition-id="lower-third"
        data-composition-src="compositions/lower-third.html"
        data-start="5.5"
        data-duration="4"
        data-track-index="11"
        style="z-index: 20;"
      ></div>

      <div
        id="seg-cp"
        class="clip overlay-full"
        data-composition-id="callout-pill"
        data-composition-src="compositions/callout-pill.html"
        data-start="14"
        data-duration="2.5"
        data-track-index="12"
        style="z-index: 20;"
      ></div>

      <div
        id="seg-end"
        class="clip overlay-full"
        data-composition-id="end-card"
        data-composition-src="compositions/end-card.html"
        data-start="22"
        data-duration="3"
        data-track-index="13"
        style="z-index: 50;"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
