<template id="callout-pill-template">
  <div
    data-composition-id="callout-pill"
    data-start="0"
    data-duration="2.5"
    data-width="1080"
    data-height="1920"
  >
    <div class="cp-wrap">
      <div class="cp-pill">
        <span id="cp-prefix" class="cp-prefix clip" data-start="0" data-duration="2.5" data-track-index="1">Clinically Studied</span>
        <span id="cp-rule" class="cp-rule clip" data-start="0" data-duration="2.5" data-track-index="2"></span>
        <span id="cp-claim" class="cp-claim clip" data-start="0" data-duration="2.5" data-track-index="3">10.5% Anagen Lift</span>
      </div>
      <div id="cp-cite" class="cp-cite clip" data-start="0" data-duration="2.5" data-track-index="4">
        SymHair&nbsp;Force&nbsp;peptide, in-vivo study
      </div>
    </div>

    <style>
      [data-composition-id="callout-pill"] {
        width: 1080px;
        height: 1920px;
        background: transparent;
        font-family: "DM Sans", sans-serif;
        position: relative;
        overflow: hidden;
      }
      [data-composition-id="callout-pill"] .cp-wrap {
        position: absolute;
        top: 1340px;        /* lower-third of frame, above TikTok caption chrome */
        left: 0;
        width: 1080px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      [data-composition-id="callout-pill"] .cp-pill {
        display: inline-flex;
        align-items: center;
        gap: 24px;
        padding: 22px 44px;
        background: #102B26;
        color: #f4efe9;
        border-radius: 999px;
        box-shadow: 0 16px 44px rgba(16, 43, 38, 0.28);
      }
      [data-composition-id="callout-pill"] .cp-prefix {
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #D4A574;
      }
      [data-composition-id="callout-pill"] .cp-rule {
        width: 1px;
        height: 28px;
        background: rgba(212, 165, 116, 0.5);
      }
      [data-composition-id="callout-pill"] .cp-claim {
        font-size: 32px;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: #f4efe9;
      }
      [data-composition-id="callout-pill"] .cp-cite {
        font-size: 20px;
        font-weight: 400;
        letter-spacing: 0.06em;
        color: #102B26;
        opacity: 0.7;
        background: rgba(244, 239, 233, 0.85);
        padding: 8px 20px;
        border-radius: 4px;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from(".cp-pill", { y: 20, scale: 0.92, opacity: 0, duration: 0.5, ease: "expo.out" }, 0.08);
      tl.from("#cp-prefix", { x: -8, opacity: 0, duration: 0.35, ease: "power2.out" }, 0.3);
      tl.from("#cp-claim",  { x:  8, opacity: 0, duration: 0.4,  ease: "power3.out" }, 0.45);
      tl.from("#cp-cite",   { y: 10, opacity: 0, duration: 0.45, ease: "power2.out" }, 0.7);
      window.__timelines["callout-pill"] = tl;
    </script>
  </div>
</template>
