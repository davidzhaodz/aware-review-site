<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #000;
        font-family: "DM Sans", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: #0a1f1b;  /* deeper than ink-teal so grade edges blend */
      }

      /* --- Body video wrapper --- */
      .body-wrap {
        position: absolute;
        inset: 0;
        width: 1080px;
        height: 1920px;
      }
      .body-wrap video {
        width: 1080px;
        height: 1920px;
        object-fit: cover;
        background: #0a1f1b;
      }

      /* --- Sub-composition overlays share the same 1080x1920 canvas,
             stacked via z-index over the body video --- */
      .overlay-full {
        position: absolute;
        inset: 0;
        width: 1080px;
        height: 1920px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="25"
      data-width="1080"
      data-height="1920"
    >
      <!-- Intro card (0 - 1.5s) : z=50 covers everything -->
      <div
        id="seg-intro"
        class="clip overlay-full"
        data-composition-id="intro-card"
        data-composition-src="intro-card.html"
        data-start="0"
        data-duration="1.5"
        data-track-index="10"
        style="z-index: 50;"
      ></div>

      <!-- Body video + audio (1.5 - 21.5s = 20s of edited/graded body) -->
      <div class="body-wrap" style="z-index: 1;">
        <video
          id="body-vid"
          class="clip"
          data-start="1.5"
          data-duration="20"
          data-track-index="1"
          src="../../../../tools/video-pipeline/renders/graded-body.mp4"
          muted
          playsinline
          crossorigin="anonymous"
        ></video>
      </div>
      <audio
        id="body-aud"
        class="clip"
        data-start="1.5"
        data-duration="20"
        data-track-index="2"
        data-volume="1"
        src="../../../../tools/video-pipeline/renders/graded-body.mp4"
        crossorigin="anonymous"
      ></audio>

      <!-- Optional background music bed (1.5 - 22s), ducked under voice -->
      <audio
        id="bed-music"
        class="clip"
        data-start="1.5"
        data-duration="20"
        data-track-index="3"
        data-volume="0.18"
        src="../../../../tools/video-pipeline/renders/music-track.mp3"
        crossorigin="anonymous"
      ></audio>

      <!-- Lower third (5.5 - 9.5s) : z=20 over body, under intro/end cards -->
      <div
        id="seg-lt"
        class="clip overlay-full"
        data-composition-id="lower-third"
        data-composition-src="lower-third.html"
        data-start="5.5"
        data-duration="4"
        data-track-index="11"
        style="z-index: 20;"
      ></div>

      <!-- Callout pill (14 - 16.5s) : z=20 -->
      <div
        id="seg-cp"
        class="clip overlay-full"
        data-composition-id="callout-pill"
        data-composition-src="callout-pill.html"
        data-start="14"
        data-duration="2.5"
        data-track-index="12"
        style="z-index: 20;"
      ></div>

      <!-- End card (22 - 25s) : z=50 covers everything -->
      <div
        id="seg-end"
        class="clip overlay-full"
        data-composition-id="end-card"
        data-composition-src="end-card.html"
        data-start="22"
        data-duration="3"
        data-track-index="13"
        style="z-index: 50;"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      // Root composition has no tweens of its own — sub-comp timelines drive visuals.
      // Framework auto-nests sub-timelines from loaded sub-comps.
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  
<!-- Hypothesis Annotation -->
<script src="https://hypothes.is/embed.js" async></script>
</body>
</html>
