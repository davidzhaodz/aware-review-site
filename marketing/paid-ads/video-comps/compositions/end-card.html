<template id="end-card-template">
  <div
    data-composition-id="end-card"
    data-start="0"
    data-duration="3"
    data-width="1080"
    data-height="1920"
  >
    <div class="ec-stage">
      <img
        id="ec-logo"
        class="ec-logo clip"
        data-start="0"
        data-duration="3"
        data-track-index="1"
        src="../assets/aware-logo.png"
        alt="AWARE"
      />
      <div id="ec-tag" class="ec-tag clip" data-start="0" data-duration="3" data-track-index="2">
        Meet your scalp.
      </div>
      <div id="ec-url-wrap" class="ec-url-wrap clip" data-start="0" data-duration="3" data-track-index="3">
        <div id="ec-url" class="ec-url">aware-hair.com</div>
        <div id="ec-underline" class="ec-underline"></div>
      </div>
    </div>

    <style>
      [data-composition-id="end-card"] {
        width: 1080px;
        height: 1920px;
        background: #f4efe9;
        position: relative;
        overflow: hidden;
        font-family: "DM Sans", sans-serif;
      }
      [data-composition-id="end-card"] .ec-stage {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 64px;
        padding: 0 96px;
      }
      [data-composition-id="end-card"] .ec-logo {
        width: 640px;
        height: auto;
      }
      [data-composition-id="end-card"] .ec-tag {
        font-family: "DM Sans", sans-serif;
        font-size: 46px;
        font-weight: 400;
        color: #102B26;
        letter-spacing: 0.02em;
      }
      [data-composition-id="end-card"] .ec-url-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      [data-composition-id="end-card"] .ec-url {
        font-family: "DM Sans", sans-serif;
        font-size: 34px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #102B26;
      }
      [data-composition-id="end-card"] .ec-underline {
        width: 340px;
        height: 2px;
        background: #D4A574;
        transform-origin: left center;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from("#ec-logo", { scale: 0.94, opacity: 0, duration: 0.7, ease: "expo.out" }, 0.1);
      tl.from("#ec-tag",  { y: 14, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.45);
      tl.from("#ec-url",  { y: 12, opacity: 0, duration: 0.55, ease: "power2.out" }, 0.75);
      tl.from("#ec-underline", { scaleX: 0, duration: 0.8, ease: "expo.out" }, 1.05);
      window.__timelines["end-card"] = tl;
    </script>
  </div>
</template>
