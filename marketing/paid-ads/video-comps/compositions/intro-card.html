<template id="intro-card-template">
  <div
    data-composition-id="intro-card"
    data-start="0"
    data-duration="1.5"
    data-width="1080"
    data-height="1920"
  >
    <div class="ic-stage">
      <div id="ic-eyebrow" class="ic-eyebrow clip" data-start="0" data-duration="1.5" data-track-index="1">
        Professional Scalp Care
      </div>
      <img
        id="ic-logo"
        class="ic-logo clip"
        data-start="0"
        data-duration="1.5"
        data-track-index="2"
        src="../assets/aware-logo.png"
        alt="AWARE"
      />
      <div id="ic-diamonds" class="ic-diamonds clip" data-start="0" data-duration="1.5" data-track-index="3">
        &#9670; &#9670; &#9670;
      </div>
    </div>

    <style>
      [data-composition-id="intro-card"] {
        width: 1080px;
        height: 1920px;
        background: #f4efe9;
        position: relative;
        overflow: hidden;
        font-family: "DM Sans", sans-serif;
      }
      [data-composition-id="intro-card"] .ic-stage {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 56px;
        padding: 0 96px;
      }
      [data-composition-id="intro-card"] .ic-eyebrow {
        font-size: 30px;
        font-weight: 500;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        color: #A37744;
      }
      [data-composition-id="intro-card"] .ic-logo {
        width: 760px;
        height: auto;
      }
      [data-composition-id="intro-card"] .ic-diamonds {
        font-size: 28px;
        letter-spacing: 0.9em;
        color: #A37744;
        line-height: 1;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from("#ic-eyebrow", { y: 18, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.05);
      tl.from("#ic-logo",    { scale: 0.94, opacity: 0, duration: 0.75, ease: "expo.out" }, 0.22);
      tl.from("#ic-diamonds",{ opacity: 0, letterSpacing: "0.4em", duration: 0.55, ease: "power2.out" }, 0.55);
      window.__timelines["intro-card"] = tl;
    </script>
  </div>
</template>
