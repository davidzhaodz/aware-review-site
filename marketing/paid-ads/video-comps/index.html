<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #f4efe9;
        font-family: "DM Sans", sans-serif;
        color: #102B26;
        -webkit-font-smoothing: antialiased;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #f4efe9;
      }

      .scene-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        padding: 220px 280px;
        gap: 48px;
        box-sizing: border-box;
      }

      .eyebrow {
        font-family: "DM Sans", sans-serif;
        font-size: 28px;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #A37744;
      }

      .logo-lockup {
        display: block;
        width: 960px;
        height: auto;
      }

      .divider {
        font-size: 28px;
        letter-spacing: 0.8em;
        color: #A37744;
        line-height: 1;
      }

      .tagline {
        font-family: "DM Sans", sans-serif;
        font-size: 34px;
        font-weight: 400;
        letter-spacing: 0.02em;
        color: #102B26;
        text-align: center;
        line-height: 1.3;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="3.5"
      data-width="1920"
      data-height="1080"
    >
      <div class="scene-content">
        <div
          id="eyebrow"
          class="clip eyebrow"
          data-start="0"
          data-duration="3.5"
          data-track-index="1"
        >
          Professional Scalp Care
        </div>

        <img
          id="logo"
          class="clip logo-lockup"
          data-start="0"
          data-duration="3.5"
          data-track-index="2"
          src="assets/aware-logo.png"
          alt="AWARE"
        />

        <div
          id="divider"
          class="clip divider"
          data-start="0"
          data-duration="3.5"
          data-track-index="3"
        >
          &#9670; &#9670; &#9670;
        </div>

        <div
          id="tagline"
          class="clip tagline"
          data-start="0"
          data-duration="3.5"
          data-track-index="4"
        >
          Proactive Scalp Wellness, Simplified.
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#eyebrow", { y: 18, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.2);
      tl.from("#logo", { scale: 0.94, opacity: 0, duration: 0.85, ease: "expo.out" }, 0.5);
      tl.from("#divider", { opacity: 0, letterSpacing: "0.4em", duration: 0.65, ease: "power2.out" }, 1.15);
      tl.from("#tagline", { y: 14, opacity: 0, duration: 0.7, ease: "power3.out" }, 1.4);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
