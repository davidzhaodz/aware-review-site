<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTA - Get the Full Report</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 20px;
        }

        .slide {
            width: 1080px;
            height: 1350px;
            position: relative;
            overflow: hidden;
        }

        /* BRIGHTER background */
        .bg-photo {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 50% 40% at 50% 35%, rgba(42, 118, 130, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 70% 65%, rgba(196, 156, 112, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse 80% 35% at 50% 0%, rgba(42, 118, 130, 0.2) 0%, transparent 50%),
                linear-gradient(165deg,
                    #1f524c 0%,
                    #1a4540 30%,
                    #14352f 60%,
                    #102b26 100%);
        }

        .grain {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.025;
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        /* Decorative elements */
        .corner-glow {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(42, 118, 130, 0.3) 0%, transparent 60%);
            pointer-events: none;
        }

        .bottom-glow {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(42, 118, 130, 0.2) 0%, transparent 70%);
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 60px 64px 56px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logo-text {
            color: #f4efe9;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .handle {
            color: rgba(244, 239, 233, 0.6);
            font-size: 20px;
            font-weight: 500;
        }

        /* Main content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .eyebrow {
            color: rgba(244, 239, 233, 0.7);
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 32px;
            max-width: 750px;
            line-height: 1.4;
        }

        .headline {
            color: #f4efe9;
            font-size: 100px;
            font-weight: 700;
            line-height: 1.05;
            margin-bottom: 32px;
        }

        .headline .accent {
            color: #3aa8b8;
        }

        .subtext {
            color: rgba(244, 239, 233, 0.75);
            font-size: 34px;
            font-weight: 400;
            line-height: 1.5;
            max-width: 780px;
            margin-bottom: 52px;
        }

        /* CTA Button */
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            background: #2a7682;
            color: #f4efe9;
            font-size: 32px;
            font-weight: 600;
            padding: 32px 56px;
            border-radius: 16px;
            margin-bottom: 28px;
            box-shadow:
                0 4px 28px rgba(42, 118, 130, 0.5),
                0 0 100px rgba(42, 118, 130, 0.25);
        }

        .cta-button svg {
            width: 30px;
            height: 30px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
        }

        .url {
            color: #6ec9d6;
            font-size: 34px;
            font-weight: 600;
            margin-bottom: 44px;
            letter-spacing: 0.5px;
        }

        /* Divider */
        .or-divider {
            display: flex;
            align-items: center;
            gap: 32px;
            margin-bottom: 36px;
            width: 100%;
            max-width: 600px;
        }

        .or-line {
            flex: 1;
            height: 1px;
            background: rgba(244, 239, 233, 0.25);
        }

        .or-text {
            color: rgba(244, 239, 233, 0.5);
            font-size: 20px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Alternative CTA */
        .alt-cta {
            background: rgba(244, 239, 233, 0.08);
            border: 1px solid rgba(244, 239, 233, 0.2);
            border-radius: 16px;
            padding: 28px 44px;
        }

        .alt-text {
            color: rgba(244, 239, 233, 0.85);
            font-size: 28px;
            font-weight: 400;
        }

        .alt-text strong {
            color: #f4efe9;
            font-weight: 600;
        }

        /* Footer */
        .footer {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .trend-pills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
        }

        .trend-pill {
            background: rgba(42, 118, 130, 0.2);
            border: 1px solid rgba(42, 118, 130, 0.4);
            color: rgba(244, 239, 233, 0.7);
            font-size: 16px;
            font-weight: 500;
            padding: 12px 20px;
            border-radius: 28px;
        }

        /* Bottom accent */
        .accent-line {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 7px;
            background: linear-gradient(90deg,
                transparent 0%,
                #2a7682 30%,
                #5fb8c4 50%,
                #2a7682 70%,
                transparent 100%);
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="bg-photo"></div>
        <div class="grain"></div>
        <div class="corner-glow"></div>
        <div class="bottom-glow"></div>

        <div class="content">
            <div class="header">
                <div class="logo-text">AWARE</div>
                <div class="handle">@awarehairpro</div>
            </div>

            <div class="main">
                <div class="eyebrow">This was just 1 of 12 shifts reshaping salons in 2026</div>
                <h1 class="headline">
                    Want All<br>
                    <span class="accent">12 Trends?</span>
                </h1>
                <p class="subtext">
                    Get the complete 2026 Salon Industry Trends Report - free.
                </p>

                <div class="cta-button">
                    <span>Get the Full Report</span>
                    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>

                <div class="url">awarehair.com/trends</div>

                <div class="or-divider">
                    <div class="or-line"></div>
                    <div class="or-text">or</div>
                    <div class="or-line"></div>
                </div>

                <div class="alt-cta">
                    <div class="alt-text">
                        Comment <strong>REPORT</strong> and I'll DM you the link
                    </div>
                </div>
            </div>

            <div class="footer">
                <div class="trend-pills">
                    <div class="trend-pill">AI Discovery</div>
                    <div class="trend-pill">Scalp Care Boom</div>
                    <div class="trend-pill">Gen Z Behavior</div>
                    <div class="trend-pill">+ 9 More</div>
                </div>
            </div>
        </div>

        <div class="accent-line"></div>
    </div>

<!-- Hypothesis Annotation -->
<script src="https://hypothes.is/embed.js" async></script>
</body>
</html>
