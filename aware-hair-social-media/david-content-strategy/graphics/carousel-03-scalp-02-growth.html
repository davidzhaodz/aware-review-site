<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 2 - Search Growth</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a0a; padding: 20px; }
        .slide { width: 1080px; height: 1350px; position: relative; overflow: hidden; }
        .bg-photo { position: absolute; inset: 0; background: radial-gradient(ellipse 50% 40% at 50% 30%, rgba(42, 118, 130, 0.15) 0%, transparent 50%), radial-gradient(ellipse 60% 50% at 30% 70%, rgba(42, 118, 130, 0.1) 0%, transparent 50%), linear-gradient(155deg, #1a4540 0%, #14352f 35%, #102b26 65%, #0d221e 100%); }
        .grain { position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E"); opacity: 0.03; mix-blend-mode: overlay; pointer-events: none; }
        .content { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; padding: 56px 56px 48px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .finding-badge { background: rgba(42, 118, 130, 0.25); border: 1px solid rgba(42, 118, 130, 0.5); color: #6ec9d6; font-size: 18px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; padding: 12px 20px; border-radius: 6px; }
        .slide-indicator { color: rgba(244, 239, 233, 0.5); font-size: 20px; font-weight: 500; }
        .main-section { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .label { color: rgba(244, 239, 233, 0.7); font-size: 28px; font-weight: 500; margin-bottom: 20px; }
        .big-stat { display: flex; align-items: baseline; justify-content: center; margin-bottom: 16px; }
        .stat-number { font-size: 200px; font-weight: 700; color: #3aa8b8; line-height: 0.85; letter-spacing: -8px; }
        .stat-symbol { font-size: 90px; font-weight: 700; color: #3aa8b8; margin-left: 4px; }
        .stat-label { color: #f4efe9; font-size: 56px; font-weight: 600; margin-bottom: 48px; }
        .search-terms { display: flex; flex-direction: column; gap: 16px; margin-bottom: 48px; width: 100%; max-width: 700px; }
        .search-term { background: rgba(244, 239, 233, 0.08); border-radius: 12px; padding: 20px 28px; display: flex; justify-content: space-between; align-items: center; }
        .term-text { color: rgba(244, 239, 233, 0.9); font-size: 26px; font-weight: 500; }
        .term-growth { color: #3aa8b8; font-size: 28px; font-weight: 700; }
        .action-box { background: rgba(42, 118, 130, 0.18); backdrop-filter: blur(12px); border: 2px solid rgba(42, 118, 130, 0.4); border-radius: 18px; padding: 32px 40px; width: 100%; max-width: 820px; position: relative; overflow: hidden; }
        .action-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #2a7682, #5fb8c4); }
        .action-label { display: inline-flex; align-items: center; gap: 12px; color: #6ec9d6; font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
        .action-label svg { width: 24px; height: 24px; fill: currentColor; }
        .action-text { color: #f4efe9; font-size: 28px; font-weight: 500; line-height: 1.45; }
        .footer { display: flex; justify-content: space-between; align-items: center; padding-top: 24px; }
        .source { color: rgba(244, 239, 233, 0.45); font-size: 18px; }
        .swipe-hint { display: flex; align-items: center; gap: 12px; color: rgba(244, 239, 233, 0.6); font-size: 18px; }
        .swipe-hint svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }
    </style>
</head>
<body>
    <div class="slide">
        <div class="bg-photo"></div>
        <div class="grain"></div>
        <div class="content">
            <div class="header">
                <div class="finding-badge">The Data</div>
                <div class="slide-indicator">@awarehairpro</div>
            </div>
            <div class="main-section">
                <div class="label">"Scalp spa" searches grew</div>
                <div class="big-stat">
                    <span class="stat-number">+349</span>
                    <span class="stat-symbol">%</span>
                </div>
                <div class="stat-label">year over year</div>
                <div class="search-terms">
                    <div class="search-term">
                        <span class="term-text">"Hair growth serum"</span>
                        <span class="term-growth">+306%</span>
                    </div>
                    <div class="search-term">
                        <span class="term-text">"Scalp treatment"</span>
                        <span class="term-growth">+180%</span>
                    </div>
                    <div class="search-term">
                        <span class="term-text">"Head spa near me"</span>
                        <span class="term-growth">+220%</span>
                    </div>
                </div>
                <div class="action-box">
                    <div class="action-label">
                        <svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                        What This Means
                    </div>
                    <div class="action-text">
                        Clients are actively searching for scalp services. The question is: will they find YOUR salon?
                    </div>
                </div>
            </div>
            <div class="footer">
                <div class="source">Source: Spate / GCI Magazine</div>
                <div class="swipe-hint">
                    <span>Next</span>
                    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </div>
        </div>
    </div>

</html>
