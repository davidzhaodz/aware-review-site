<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTA - Texts Carousel</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a0a; padding: 20px; }
        .slide { width: 1080px; height: 1350px; position: relative; overflow: hidden; }
        .bg-photo { position: absolute; inset: 0; background: radial-gradient(ellipse 50% 40% at 50% 35%, rgba(42, 118, 130, 0.25) 0%, transparent 50%), linear-gradient(165deg, #1f524c 0%, #1a4540 30%, #14352f 60%, #102b26 100%); }
        .grain { position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E"); opacity: 0.025; mix-blend-mode: overlay; pointer-events: none; }
        .corner-glow { position: absolute; top: -100px; right: -100px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(42, 118, 130, 0.3) 0%, transparent 60%); pointer-events: none; }
        .content { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; padding: 60px 64px 56px; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; }
        .logo-text { color: #f4efe9; font-size: 26px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
        .handle { color: rgba(244, 239, 233, 0.6); font-size: 20px; font-weight: 500; }
        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .headline { color: #f4efe9; font-size: 80px; font-weight: 700; line-height: 1.1; margin-bottom: 32px; }
        .headline .accent { color: #3aa8b8; }
        .subtext { color: rgba(244, 239, 233, 0.75); font-size: 32px; font-weight: 400; line-height: 1.5; max-width: 780px; margin-bottom: 48px; }
        .action-row { display: flex; gap: 24px; margin-bottom: 48px; }
        .action-btn { background: rgba(42, 118, 130, 0.25); border: 2px solid rgba(42, 118, 130, 0.5); color: #f4efe9; font-size: 24px; font-weight: 600; padding: 20px 36px; border-radius: 14px; display: flex; align-items: center; gap: 12px; }
        .action-btn svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; }
        .cta-button { display: inline-flex; align-items: center; gap: 20px; background: #2a7682; color: #f4efe9; font-size: 32px; font-weight: 600; padding: 32px 56px; border-radius: 16px; margin-bottom: 28px; box-shadow: 0 4px 28px rgba(42, 118, 130, 0.5); }
        .cta-button svg { width: 30px; height: 30px; fill: none; stroke: currentColor; stroke-width: 2.5; }
        .url { color: #6ec9d6; font-size: 30px; font-weight: 600; margin-bottom: 36px; }
        .or-divider { display: flex; align-items: center; gap: 32px; margin-bottom: 36px; width: 100%; max-width: 600px; }
        .or-line { flex: 1; height: 1px; background: rgba(244, 239, 233, 0.25); }
        .or-text { color: rgba(244, 239, 233, 0.5); font-size: 20px; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; }
        .alt-cta { background: rgba(244, 239, 233, 0.08); border: 1px solid rgba(244, 239, 233, 0.2); border-radius: 16px; padding: 28px 44px; }
        .alt-text { color: rgba(244, 239, 233, 0.85); font-size: 28px; font-weight: 400; }
        .alt-text strong { color: #f4efe9; font-weight: 600; }
        .footer { display: flex; justify-content: center; align-items: center; }
        .save-reminder { color: rgba(244, 239, 233, 0.6); font-size: 22px; }
        .accent-line { position: absolute; bottom: 0; left: 0; right: 0; height: 7px; background: linear-gradient(90deg, transparent 0%, #2a7682 30%, #5fb8c4 50%, #2a7682 70%, transparent 100%); }
    </style>
</head>
<body>
    <div class="slide">
        <div class="bg-photo"></div>
        <div class="grain"></div>
        <div class="corner-glow"></div>
        <div class="content">
            <div class="header">
                <div class="logo-text">AWARE</div>
                <div class="handle">@awarehairpro</div>
            </div>
            <div class="main">
                <h1 class="headline">
                    <span class="accent">Save</span> This Post
                </h1>
                <p class="subtext">
                    Screenshot these templates and use them this week. Reactivating just 2-3 old clients = a full day of bookings.
                </p>
                <div class="action-row">
                    <div class="action-btn">
                        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                        Save
                    </div>
                    <div class="action-btn">
                        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                        Share with a stylist friend
                    </div>
                </div>
                <div class="or-divider">
                    <div class="or-line"></div>
                    <div class="or-text">want more?</div>
                    <div class="or-line"></div>
                </div>
                <div class="cta-button">
                    <span>Get 12 More Trends</span>
                    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
                <div class="url">awarehair.com/trends</div>
            </div>
            <div class="footer">
                <div class="save-reminder">Follow @awarehairpro for more salon growth tips</div>
            </div>
        </div>
        <div class="accent-line"></div>
    </div>

<!-- Hypothesis Annotation -->
<script src="https://hypothes.is/embed.js" async></script>
</body>
</html>
